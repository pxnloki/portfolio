    // --- Hooks ---
    const useCustomCursor = () => {
      const [position, setPosition] = useState({ x: -100, y: -100 });
      const [isHovering, setIsHovering] = useState(false);
      const [hoverText, setHoverText] = useState("");
      const [isLightbox, setIsLightbox] = useState(false);

      useEffect(() => {
        const updateMousePosition = (e) => {
          setPosition({ x: e.clientX, y: e.clientY });
        };
        window.addEventListener("mousemove", updateMousePosition);
        return () => window.removeEventListener("mousemove", updateMousePosition);
      }, []);

      return { position, isHovering, setIsHovering, hoverText, setHoverText, isLightbox, setIsLightbox };
    };

    const useScrollReveal = (dependency) => {
      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("translate-y-0", "opacity-100", "scale-100");
                entry.target.classList.remove("translate-y-12", "opacity-0", "scale-95");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.05, rootMargin: "0px 0px -50px 0px" }
        );
        const elements = document.querySelectorAll(".reveal-on-scroll");
        elements.forEach((el) => {
          el.classList.add("translate-y-12", "opacity-0", "scale-95");
          el.classList.remove("translate-y-0", "opacity-100", "scale-100");
          setTimeout(() => observer.observe(el), 50);
        });
        return () => elements.forEach((el) => observer.unobserve(el));
      }, [dependency]);
    };

          snapshot.forEach(doc => fetched.push(doc.data()));

        });
        return () => unsubscribe();

          else setShowBackToTop(false);

                    <div className="flex flex-col gap-2">
                      <label className="text-xs text-gray-500 tracking-widest uppercase">Project Title</label>
                      <input type="text" value={newProject.title} onChange={(e) => setNewProject({...newProject, title: e.target.value})} placeholder="e.g. 洛奇的密室 全新视觉" className="bg-transparent border-b border-gray-700 py-3 text-white outline-none focus:border-white transition-colors" required />
                    </div>
                    <div className="flex flex-col gap-2">
                      <label className="text-xs text-gray-500 tracking-widest uppercase">Client / Brand</label>
                      <input type="text" value={newProject.client} onChange={(e) => setNewProject({...newProject, client: e.target.value})} placeholder="e.g. Loki's Room" className="bg-transparent border-b border-gray-700 py-3 text-white outline-none focus:border-white transition-colors" />
                    </div>
                    <div className="flex flex-col gap-2">
                      <label className="text-xs text-gray-500 tracking-widest uppercase">Category</label>
                      <select value={newProject.category} onChange={(e) => setNewProject({...newProject, category: e.target.value})} className="bg-[#111] border-b border-gray-700 py-3 text-white outline-none focus:border-white transition-colors appearance-none">
                        {CATEGORIES.filter(c => c !== "All").map(cat => <option key={cat} value={cat}>{cat}</option>)}
                      </select>
                    </div>
                    <div className="flex flex-col gap-2">
                      <label className="text-xs text-gray-500 tracking-widest uppercase">Image URL (16:9 recommended)</label>
                      <input type="url" value={newProject.image} onChange={(e) => setNewProject({...newProject, image: e.target.value})} placeholder="https://your-image-url.jpg" className="bg-transparent border-b border-gray-700 py-3 text-white outline-none focus:border-white transition-colors" required />
                    </div>
                  </div>
                  <button type="submit" className="mt-4 bg-white text-black py-4 rounded-lg font-bold tracking-widest uppercase text-sm hover:bg-green-400 hover:text-black transition-colors">Publish Project</button>

                          <img src={proj.image} alt={proj.title} className="w-16 h-10 md:w-24 md:h-14 object-cover rounded" />
                          <div>

          </div>

              <section className="py-32 md:py-48 border-t border-[#111]/10 dark:border-white/10 relative z-10 transition-colors duration-700">

                  <div className="md:col-span-5 flex flex-col gap-12 reveal-on-scroll translate-y-12 opacity-0 transition-all duration-1000">
                    <h2 className="text-xs font-bold tracking-widest uppercase text-gray-400 dark:text-gray-500">Philosophy</h2>
                    <div className="text-2xl md:text-3xl lg:text-4xl leading-snug font-medium tracking-tight font-serif italic text-[#111] dark:text-[#f7f7f5]">
                      "Research is to see what everybody else has seen and to think what nobody else has thought."
                    </div>
                    <p className="text-sm text-gray-500 tracking-widest uppercase">— Albert Szent-Gyorgyi</p>
                  </div>
                  <div className="md:col-span-7 flex flex-col gap-8 reveal-on-scroll translate-y-12 opacity-0 transition-all duration-1000 delay-200">
                     <p className="text-lg md:text-xl text-gray-600 dark:text-gray-400 leading-relaxed font-light">拥有16年品牌营销与4年创业合伙人经验。擅长将深刻的消费者洞察转化为驱动业务增长的整合营销策略，深度参与客户商业决策，以终为始打磨创意方案。</p>
                     <p className="text-lg md:text-xl text-gray-600 dark:text-gray-400 leading-relaxed font-light">曾主导100+项目，覆盖快消、国际品牌、高端酒店及娱乐IP等多元领域。现深度探索 AIGC 领域，独立跑通从 LLM 脚本生成到视觉落地的全链路，利用 AI 技术将产出效率提升40%以上。</p>
                  </div>
                </div>
              </section>
            </main>

            <footer className="bg-[#111] dark:bg-black text-[#f7f7f5] px-4 md:px-12 pt-32 pb-12 flex flex-col justify-between min-h-[80vh] relative z-10 transition-colors duration-700 border-t border-white/5">
              <div className="reveal-on-scroll translate-y-12 opacity-0 transition-all duration-1000 max-w-7xl">

                  <span className="relative flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                  <span className="text-xs font-bold tracking-widest uppercase text-gray-400">Currently accepting selected projects</span>
                </div>
                <h2 className="text-3xl md:text-5xl lg:text-7xl leading-tight font-medium tracking-tighter mb-12">
                  Ready to craft the next <br className="hidden md:block"/><span className="italic font-serif text-gray-400">industry benchmark?</span>
                </h2>
                <p className="text-sm md:text-base text-gray-400 max-w-xl mb-16 font-light leading-relaxed">Great design is invisible, but its impact is undeniable. Let's combine strategic insight with avant-garde aesthetics to elevate your brand.</p>
                <a href="mailto:pxnjack@gmail.com?subject=Project%20Inquiry" className={`group inline-flex flex-wrap items-center gap-4 md:gap-8 text-[7vw] md:text-[5vw] leading-none tracking-tighter font-medium text-white hover:text-gray-300 transition-colors border-b-2 border-transparent hover:border-white pb-2 ${!lightboxImage ? 'cursor-none' : ''}`} onMouseEnter={() => handleMouseEnter("Say Hi")} onMouseLeave={handleMouseLeave}>
                  <span>pxnjack@gmail.com</span><ArrowUpRight className="w-10 h-10 md:w-16 md:h-16 group-hover:rotate-45 group-hover:translate-x-4 transition-transform duration-500" />
                </a>
              </div>
              <div className="mt-32 pt-12 border-t border-white/10 flex flex-col md:flex-row justify-between items-start md:items-end gap-12 text-[10px] md:text-xs font-bold tracking-widest uppercase text-gray-500 reveal-on-scroll translate-y-12 opacity-0 transition-all duration-1000 delay-200">
                <div className="flex flex-col md:flex-row gap-4 md:gap-12">
                   <span className={`hover:text-white transition-colors ${!lightboxImage ? 'cursor-none' : ''}`} onMouseEnter={() => handleMouseEnter("Copy")} onMouseLeave={handleMouseLeave}>WeChat: Lokipxn</span>
                   <span className={`hover:text-white transition-colors ${!lightboxImage ? 'cursor-none' : ''}`} onMouseEnter={() => handleMouseEnter("Call")} onMouseLeave={handleMouseLeave}>Tel: 138 1669 7359</span>
                   <button onClick={() => setViewState("login")} className={`flex items-center gap-2 hover:text-white transition-colors ${!lightboxImage ? 'cursor-none' : ''}`} onMouseEnter={() => handleMouseEnter("Login")} onMouseLeave={handleMouseLeave}>
                     <Lock className="w-3 h-3" /> Admin
                   </button>
                </div>
                <p>© {new Date().getFullYear()} LOKI WANG. DESIGNED FOR IMPACT.</p>
              </div>
            </footer>
          </div>
        </div>
      );
    }

    // 挂载应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
