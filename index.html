        });
        function raf(time) {
          lenis.raf(time);
          requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
        
        // 绑定 GSAP ScrollTrigger 和 Lenis
        gsap.registerPlugin(ScrollTrigger);
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time)=>{ lenis.raf(time * 1000) });
        gsap.ticker.lagSmoothing(0);

        return () => { lenis.destroy(); gsap.ticker.remove(lenis.raf); };
      }, []);
    };

    // --- 核心 Hook：GSAP 动画 (包含多图片的视差支持) ---
    const useGsapAnimations = (dependency) => {
      useLayoutEffect(() => {
        gsap.registerPlugin(ScrollTrigger);
        let ctx = gsap.context(() => {
          
          gsap.utils.toArray('.mask-text-inner').forEach(text => {
            gsap.to(text, {
              y: "0%", ease: "power4.out", duration: 1.5, stagger: 0.1,
              scrollTrigger: { trigger: text.closest('.mask-text-container'), start: "top 85%" }
            });
          });

          gsap.utils.toArray('.parallax-container').forEach(container => {
            const imgs = container.querySelectorAll('img');
            if(imgs.length > 0) {
               gsap.to(imgs, {
                 yPercent: 15, ease: "none",
                 scrollTrigger: { trigger: container, start: "top bottom", end: "bottom top", scrub: true }
               });
            }
          });

          gsap.utils.toArray('.project-card').forEach((card) => {
            gsap.fromTo(card, 
              { opacity: 0, y: 50 },
              { opacity: 1, y: 0, duration: 1.2, ease: "power3.out", scrollTrigger: { trigger: card, start: "top 85%" } }
            );
          });

        });
        return () => ctx.revert();
      }, [dependency]);
    };

      useEffect(() => {
        const updateMouse = (e) => setPos({ x: e.clientX, y: e.clientY });
        window.addEventListener("mousemove", updateMouse);
        return () => window.removeEventListener("mousemove", updateMouse);
      }, []);

      return { pos, isHovering, setIsHovering, hoverText, setHoverText };
    };
