    // --- 核心 Hook：Lenis 丝滑滚动 ---
    const useSmoothScroll = () => {
      useEffect(() => {
        const lenis = new Lenis({
          duration: 1.5,
          easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
          smooth: true,
        });
        function raf(time) {
          lenis.raf(time);
          requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
        
        // 绑定 GSAP ScrollTrigger 和 Lenis
        gsap.registerPlugin(ScrollTrigger);
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time)=>{ lenis.raf(time * 1000) });
        gsap.ticker.lagSmoothing(0);

        return () => { lenis.destroy(); gsap.ticker.remove(lenis.raf); };
      }, []);
    };

    // --- 核心 Hook：GSAP 动画 (GIA风格视差与遮罩) ---
    const useGsapAnimations = (dependency) => {
      useLayoutEffect(() => {
        gsap.registerPlugin(ScrollTrigger);
        let ctx = gsap.context(() => {
          
          // 1. 文字遮罩升起动画
          gsap.utils.toArray('.mask-text-inner').forEach(text => {
            gsap.to(text, {
              y: "0%",
              ease: "power4.out",
              duration: 1.5,
              stagger: 0.1,
              scrollTrigger: {
                trigger: text.closest('.mask-text-container'),
                start: "top 85%",
              }
            });
          });

          // 2. GIA风格 图片视差动画 (Parallax)
          gsap.utils.toArray('.parallax-container').forEach(container => {
            const img = container.querySelector('img');
            gsap.to(img, {
              yPercent: 15,
              ease: "none",
              scrollTrigger: {
                trigger: container,
                start: "top bottom",
                end: "bottom top",
                scrub: true
              }
            });
          });

          // 3. 项目卡片渐显动画
          gsap.utils.toArray('.project-card').forEach((card, i) => {
            gsap.fromTo(card, 
              { opacity: 0, y: 50 },
              { opacity: 1, y: 0, duration: 1.2, ease: "power3.out", scrollTrigger: { trigger: card, start: "top 85%" } }
            );
          });

        });
        return () => ctx.revert();
      }, [dependency]);
    };

    // --- 核心 Hook：GIA 风格流体光标 ---
    const useCustomCursor = () => {
      const [pos, setPos] = useState({ x: -100, y: -100 });
      const [isHovering, setIsHovering] = useState(false);
      const [hoverText, setHoverText] = useState("");

      useEffect(() => {
        const updateMouse = (e) => setPos({ x: e.clientX, y: e.clientY });
        window.addEventListener("mousemove", updateMouse);
        return () => window.removeEventListener("mousemove", updateMouse);
      }, []);

      return { pos, isHovering, setIsHovering, hoverText, setHoverText };
    };

    // --- 主程序 ---
    function App() {
      useSmoothScroll();
      
      const [isDarkMode, setIsDarkMode] = useState(false); // 默认亮色系更符合 GIA 的审美
      const cursor = useCustomCursor();

      // 修复 2：同步切换 html 标签的 dark 类名，确保整个网页（含 body 背景）都能变色
      useEffect(() => {
        if (isDarkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [isDarkMode]);

      const [user, setUser] = useState(null);
      const [customProjects, setCustomProjects] = useState([]);
      const [activeCategory, setActiveCategory] = useState("All");
      const [lightboxImage, setLightboxImage] = useState(null);
      const [viewState, setViewState] = useState("portfolio"); 
      const [passwordInput, setPasswordInput] = useState("");
      const [newProject, setNewProject] = useState({ title: "", client: "", category: CATEGORIES[1], image: "" });

      // Firebase 数据监听
      useEffect(() => {
        if (!auth) return;
        const unsubscribe = auth.onAuthStateChanged((u) => { if(u) setUser(u); else auth.signInAnonymously(); });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const unsubscribe = db.collection('projects').onSnapshot((snapshot) => {
          const fetched = [];
          snapshot.forEach(doc => fetched.push(doc.data()));
          fetched.sort((a, b) => b.id - a.id);
          setCustomProjects(fetched);
        });
        return () => unsubscribe();
      }, [user]);

      const currentProjects = [...customProjects, ...INITIAL_PROJECTS];
      const filteredProjects = activeCategory === "All" ? currentProjects : currentProjects.filter(p => p.category === activeCategory);

      // 触发 GSAP 动画
      useGsapAnimations(activeCategory);

      // 交互控制
      const onHover = (text) => { cursor.setIsHovering(true); cursor.setHoverText(text); };
      const onLeave = () => { cursor.setIsHovering(false); cursor.setHoverText(""); };
      const openLightbox = (img) => { setLightboxImage(img); document.body.style.overflow = 'hidden'; onHover("Close"); };
      const closeLightbox = () => { setLightboxImage(null); document.body.style.overflow = 'auto'; onLeave(); };

      // 后台逻辑
      const handleLogin = (e) => { e.preventDefault(); if(passwordInput === "loki2026") { setViewState("admin"); setPasswordInput(""); } else alert("密码错误"); };

        e.preventDefault();
        const newId = Date.now();
        const p = { ...newProject, id: newId };

          setCustomProjects([p, ...customProjects]);
          alert("本地测试发布成功！");
          return setNewProject({ title: "", client: "", category: CATEGORIES[1], image: "" });
        }
        await db.collection('projects').doc(newId.toString()).set(p);
        alert("云端发布成功！");
        setNewProject({ title: "", client: "", category: CATEGORIES[1], image: "" });
      };

        if(!window.confirm("确认删除？")) return;
        if(!db) return setCustomProjects(customProjects.filter(p=>p.id!==id));
        await db.collection('projects').doc(id.toString()).delete();

                <p className="text-gia-accent text-sm mb-12 font-light">Access the content management system.</p>
                <form onSubmit={handleLogin} className="flex flex-col gap-6">
                  <input type="password" placeholder="Password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full bg-transparent border-b border-gia-accent py-4 text-xl text-white placeholder-gia-accent outline-none focus:border-white transition-colors" autoFocus />

                </form>

            ) : (

                <div className="flex justify-between items-center border-b border-white/10 pb-8 mb-12">

                <div className="bg-white/5 p-8 md:p-12 rounded-xl">
                  <form onSubmit={handleAddProject} className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div className="flex flex-col gap-2"><label className="text-xs uppercase tracking-widest text-gia-accent">Title</label><input type="text" value={newProject.title} onChange={e=>setNewProject({...newProject,title:e.target.value})} className="bg-transparent border-b border-white/20 py-2 outline-none focus:border-white" required/></div>
                    <div className="flex flex-col gap-2"><label className="text-xs uppercase tracking-widest text-gia-accent">Client</label><input type="text" value={newProject.client} onChange={e=>setNewProject({...newProject,client:e.target.value})} className="bg-transparent border-b border-white/20 py-2 outline-none focus:border-white"/></div>
                    <div className="flex flex-col gap-2"><label className="text-xs uppercase tracking-widest text-gia-accent">Category</label><select value={newProject.category} onChange={e=>setNewProject({...newProject,category:e.target.value})} className="bg-[#222] border-b border-white/20 py-2 outline-none">{CATEGORIES.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}</select></div>
                    <div className="flex flex-col gap-2"><label className="text-xs uppercase tracking-widest text-gia-accent">Image URL (16:9)</label><input type="url" value={newProject.image} onChange={e=>setNewProject({...newProject,image:e.target.value})} className="bg-transparent border-b border-white/20 py-2 outline-none focus:border-white" required/></div>
                    <button type="submit" className="md:col-span-2 mt-4 bg-white text-black py-4 text-xs font-bold uppercase tracking-widest hover:bg-gray-200">Publish</button>
                  </form>
                </div>
                <div className="mt-12 flex flex-col gap-4">
                  {customProjects.map(p => (
                    <div key={p.id} className="flex justify-between items-center bg-white/5 p-4 rounded-lg">
                      <div className="flex items-center gap-4"><img src={p.image} className="w-16 h-10 object-cover"/><span className="font-serif italic">{p.title}</span></div>
                      <button onClick={()=>handleDelete(p.id)} className="text-red-400 hover:text-red-300"><IconTrash className="w-5 h-5"/></button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
         );
      }

      // --- Main Portfolio View (GIA Inspired) ---
      return (

          <div className="min-h-screen relative">
            
            {/* 流体光标 (GIA 风格) */}
            <div className={`fixed top-0 left-0 pointer-events-none z-[9999] hidden md:flex items-center justify-center rounded-full transition-all duration-300 ease-out mix-blend-difference ${cursor.isHovering ? 'w-24 h-24 bg-white' : 'w-4 h-4 bg-white'} ${cursor.isLightbox ? 'mix-blend-normal bg-gia-bg' : ''}`} style={{transform: `translate3d(${cursor.pos.x}px, ${cursor.pos.y}px, 0) translate(-50%, -50%)`}}>
              {cursor.isHovering && <span className={`text-[10px] font-bold tracking-widest uppercase opacity-100 transition-opacity duration-300 ${cursor.isLightbox ? 'text-black' : 'text-black'}`}>{cursor.hoverText}</span>}
            </div>

            {/* 巨幅全屏灯箱 */}
            {lightboxImage && (
              <div className="fixed inset-0 z-[500] bg-gia-darkBg/95 backdrop-blur-xl flex items-center justify-center p-4 md:p-12 animate-in fade-in duration-500" onClick={closeLightbox}>
                <button className="absolute top-8 right-8 text-white md:hidden z-[501]" onClick={closeLightbox}><IconX className="w-8 h-8" /></button>
                <img src={lightboxImage} alt="Fullscreen" className="max-w-full max-h-full object-contain shadow-2xl animate-in zoom-in-95 duration-700 ease-out" />
              </div>

            {/* 导航栏 (极简社论风) */}

              <div className="text-xl font-serif italic tracking-wide">Loki Wang.</div>
              <div className="flex items-center gap-8">
                <div className="text-xs font-sans tracking-[0.2em] uppercase hidden md:block font-light">Creative Director</div>
                <button onClick={() => setIsDarkMode(!isDarkMode)} onMouseEnter={() => onHover("Theme")} onMouseLeave={onLeave} className={`hover:opacity-60 transition-opacity ${!lightboxImage ? 'cursor-none' : ''}`}>
                  {isDarkMode ? <IconSun className="w-5 h-5" /> : <IconMoon className="w-5 h-5" />}

              </div>
            </nav>

            {/* 巨幕 Hero Section (GIA Style Parallax Image & Typography) */}

              {/* 核心视差背景图 */}
              <div className="absolute inset-0 w-full h-[120%] -top-[10%]">
                <img src={HERO_PROJECTS[0].image} className="w-full h-full object-cover opacity-90 dark:opacity-70 filter brightness-[0.85] contrast-[1.1]" />
              </div>
              
              {/* 遮罩巨字 (GSAP Mask Reveal) */}
              <div className="relative z-10 text-center text-white mix-blend-overlay mask-text-container w-full px-4">
                <div className="mask-text"><h1 className="mask-text-inner text-[18vw] md:text-[12vw] font-serif italic leading-[0.8] tracking-tighter">Strategy.</h1></div><br/>
                <div className="mask-text"><h1 className="mask-text-inner text-[18vw] md:text-[12vw] font-serif leading-[0.8] tracking-tighter ml-[10vw]">Insight.</h1></div><br/>
                <div className="mask-text"><h1 className="mask-text-inner text-[18vw] md:text-[12vw] font-serif italic leading-[0.8] tracking-tighter mr-[15vw]">Creative.</h1></div>
              </div>

              {/* 极简向下滚动提示 */}
              <div className="absolute bottom-10 left-1/2 -translate-x-1/2 text-white flex flex-col items-center gap-4 mask-text-container">
                <div className="mask-text"><span className="mask-text-inner text-[9px] uppercase tracking-[0.3em] opacity-70">Scroll to explore</span></div>
                <div className="w-[1px] h-12 bg-white/30 overflow-hidden relative">
                  <div className="w-full h-full bg-white absolute top-0 -translate-y-full animate-[scrolldown_2s_ease-in-out_infinite]"></div>
                </div>
              </div>
            </header>

            <main className="px-4 md:px-12 pt-32 pb-32 max-w-[1600px] mx-auto">
              
              {/* 哲学/简介区 (GIA Style Editorial Intro) */}
              <section className="pb-32 md:pb-48 grid grid-cols-1 md:grid-cols-12 gap-12 mask-text-container">
                <div className="md:col-span-4">
                  <div className="mask-text"><h2 className="mask-text-inner text-xs uppercase tracking-[0.2em] text-gia-accent font-sans">Philosophy</h2></div>
                </div>
                <div className="md:col-span-8 flex flex-col gap-10">
                  <div className="mask-text">
                    <p className="mask-text-inner text-3xl md:text-5xl lg:text-6xl font-serif italic leading-tight tracking-tight">
                      "Research is to see what everybody else has seen and to think what nobody else has thought."
                    </p>
                  </div>
                  <div className="mask-text">
                    <p className="mask-text-inner text-sm uppercase tracking-widest text-gia-accent">— Albert Szent-Gyorgyi</p>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mt-8 mask-text">
                    <p className="mask-text-inner text-base md:text-lg leading-relaxed font-light text-gia-text/80 dark:text-gia-darkText/80">拥有16年品牌营销与4年创业合伙人经验。擅长将深刻的消费者洞察转化为驱动业务增长的整合营销策略，深度参与客户商业决策。</p>
                    <p className="mask-text-inner text-base md:text-lg leading-relaxed font-light text-gia-text/80 dark:text-gia-darkText/80">现深度探索 AIGC 领域，独立跑通从 LLM 脚本生成到视觉落地的全链路，利用 AI 技术将产出效率提升40%以上。</p>
                  </div>
                </div>
              </section>

              {/* 修复 1：将吸顶位置从 top-0 下移到 top-[80px]/top-[110px]，避开顶部固定导航栏的遮挡 */}
              <div className="sticky top-[80px] md:top-[110px] z-40 bg-gia-bg/90 dark:bg-gia-darkBg/90 backdrop-blur-xl py-6 border-b border-gia-text/10 dark:border-gia-darkText/10 mb-20 flex overflow-x-auto hide-scrollbar gap-8 md:gap-12 transition-colors duration-700 -mx-4 px-4 md:mx-0 md:px-0">

                {filteredProjects.map((project, index) => {

                  const isEven = index % 2 !== 0;
                  return (

                        {/* 优雅的半透明遮罩 */}
                        <div className="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                      </div>

                      {/* 项目信息 (极简社论排版) */}

                        <div className="flex items-center gap-4 text-[10px] uppercase tracking-[0.2em] text-gia-accent font-sans">
                          <span>{project.category}</span>
                          <span className="w-4 h-[1px] bg-gia-accent/50"></span>
                          <span>{project.client}</span>
                        </div>
                        <h3 className="text-3xl md:text-4xl font-serif italic tracking-tight text-gia-text dark:text-gia-darkText group-hover:text-gia-accent transition-colors duration-500">
                          {project.title}
                        </h3>
                      </div>
                    </div>
                  );
                })}
              </section>
              
              {filteredProjects.length === 0 && <div className="py-40 text-center text-gia-accent text-xs tracking-widest uppercase">Updating soon...</div>}
            </main>

            {/* 巨型 Footer (GIA Style CTA) */}

              <div className="max-w-[1600px] mx-auto w-full flex flex-col h-full justify-between mask-text-container">
                
                <div>
                  <div className="mask-text mb-16">
                    <div className="mask-text-inner flex items-center gap-3">
                      <span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                      <span className="text-[10px] font-sans tracking-[0.2em] uppercase text-white/60">Currently accepting selected projects</span>
                    </div>
                  </div>

                  <div className="mask-text">
                    <h2 className="mask-text-inner text-5xl md:text-7xl lg:text-[8vw] font-serif leading-[0.9] tracking-tighter mb-12">
                      Ready to craft <br/><span className="italic text-white/50">the next benchmark?</span>
                    </h2>
                  </div>
                </div>

                <div className="mt-auto mask-text">
                  <a href="mailto:pxnjack@gmail.com?subject=Project%20Inquiry" className={`mask-text-inner group inline-flex items-center gap-6 text-3xl md:text-5xl font-serif italic text-white hover:text-white/60 transition-colors pb-4 border-b border-white/20 hover:border-white/60 ${!lightboxImage ? 'cursor-none' : ''}`} onMouseEnter={() => onHover("Say Hi")} onMouseLeave={onLeave}>
                    <span>pxnjack@gmail.com</span><IconArrowUpRight className="w-8 h-8 md:w-12 md:h-12 group-hover:rotate-45 group-hover:translate-x-2 transition-transform duration-500" />
                  </a>
                </div>

                <div className="mt-24 pt-8 border-t border-white/10 flex flex-col md:flex-row justify-between items-start md:items-end gap-8 text-[10px] font-sans tracking-[0.2em] uppercase text-white/50">
                  <div className="flex flex-col md:flex-row gap-6 md:gap-12">
                     <span className={`hover:text-white transition-colors ${!lightboxImage ? 'cursor-none' : ''}`} onMouseEnter={() => onHover("Copy")} onMouseLeave={onLeave}>WeChat: Lokipxn</span>
                     <span className={`hover:text-white transition-colors ${!lightboxImage ? 'cursor-none' : ''}`} onMouseEnter={() => onHover("Call")} onMouseLeave={onLeave}>Tel: 138 1669 7359</span>
                     <button onClick={() => setViewState("login")} className={`flex items-center gap-2 hover:text-white transition-colors ${!lightboxImage ? 'cursor-none' : ''}`} onMouseEnter={() => onHover("Login")} onMouseLeave={onLeave}>
                       <IconLock className="w-3 h-3" /> Admin
                     </button>
                  </div>
                  <p>© {new Date().getFullYear()} LOKI WANG. DESIGNED FOR IMPACT.</p>
                </div>
              </div>
            </footer>
          </div>

          <style dangerouslySetInnerHTML={{__html: `
            @keyframes scrolldown {
              0% { transform: translateY(-100%); }
              50% { transform: translateY(0); }
              100% { transform: translateY(100%); }
            }
          `}} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
